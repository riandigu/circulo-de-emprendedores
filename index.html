<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CÍRCULO DE EMPRENDEDORES CHILE</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      background: #f4f4f4;
    }

    /* MENÚ LATERAL */
    #sidebar {
      width: 260px;
      background: #1e293b;
      color: white;
      padding: 20px 0;
      overflow-y: auto;
    }

    #sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      cursor: pointer;
      color: white;
      user-select: none;
    }

    .category {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 1px solid #334155;
      color: white;
      text-decoration: none;
    }

    .category:hover {
      background: #334155;
    }

    /* CONTENIDO */
    #content {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
    }

    h1 {
      margin-top: 0;
    }

    /* CALUGAS */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 3px 6px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
    }

    .card-text {
      margin-top: 5px;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>
<body>

  <div id="sidebar">
    <h2 onclick="loadHome()">Categorías</h2>

    <div class="category" onclick="loadCategory('comida')">Comida y Restaurantes</div>
    <div class="category" onclick="loadCategory('salud')">Salud y Bienestar</div>
    <div class="category" onclick="loadCategory('mecanica')">Mecánica y Automotriz</div>
    <div class="category" onclick="loadCategory('tecnologia')">Tecnología</div>
    <div class="category" onclick="loadCategory('hogar')">Hogar y Servicios</div>
  </div>

  <div id="content">
    <h1>Círculo de Emprendedores Chile</h1>
    <p>Selecciona una categoría para ver los comercios.</p>
  </div>

  <script>
    const data = {
      comida: [
        {
          nombre: "Sabor Casero",
          img: "https://via.placeholder.com/300x200",
          productos: "Comida rápida, empanadas, almuerzos",
          direccion: "Av. Chile 123, Santiago",
          contacto: "+56 9 1234 5678"
        },
        {
          nombre: "Don Pan Pizza",
          img: "https://via.placeholder.com/300x200",
          productos: "Pizzas artesanales, delivery",
          direccion: "Av. Las Torres 55, Quilicura",
          contacto: "+56 9 9876 5432"
        }
      ],

      salud: [
        {
          nombre: "Centro Kinesiológico Movilfit",
          img: "https://via.placeholder.com/300x200",
          productos: "Kinesiología, masajes, recuperación física",
          direccion: "Calle Salud 90, Providencia",
          contacto: "+56 2 555 1234"
        }
      ],

      mecanica: [
        {
          nombre: "Taller Mecánico PowerCar",
          img: "https://via.placeholder.com/300x200",
          productos: "Mecánica general, scanner, frenos",
          direccion: "Av. La Industria 400, Colina",
          contacto: "+56 9 2222 1111"
        }
      ],

      tecnologia: [
        {
          nombre: "TecnoPlus",
          img: "https://via.placeholder.com/300x200",
          productos: "Computación, redes, soporte técnico",
          direccion: "Mall Tech Center, Local 18",
          contacto: "+56 9 3344 5566"
        }
      ],

      hogar: [
        {
          nombre: "Gas Express 24H",
          img: "https://via.placeholder.com/300x200",
          productos: "Gas domiciliario a toda hora",
          direccion: "Renca 1200",
          contacto: "+56 9 9988 7766"
        }
      ]
    };

    function loadCategory(cat) {
      const content = document.getElementById('content');
      const items = data[cat] || [];

      content.innerHTML = `<h1>${cat.toUpperCase()}</h1>`;

      let html = '<div class="card-grid">';
      items.forEach(item => {
        html += `
          <div class="card">
            <img src="${item.img}" />
            <div class="card-title">${item.nombre}</div>
            <div class="card-text"><strong>Productos:</strong> ${item.productos}</div>
            <div class="card-text"><strong>Dirección:</strong> ${item.direccion}</div>
            <div class="card-text"><strong>Contacto:</strong> ${item.contacto}</div>
          </div>
        `;
      });
      html += '</div>';

      content.innerHTML += html;
    }

    function loadHome() {
      const content = document.getElementById('content');
      content.innerHTML = `
        <h1>Círculo de Emprendedores Chile</h1>
        <p>Selecciona una categoría para ver los comercios.</p>
      `;
    }
  </script>

</body>
</html>
